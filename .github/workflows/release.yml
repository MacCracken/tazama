name: Release

on:
  push:
    tags:
      - '[0-9][0-9][0-9][0-9].*'

permissions:
  contents: write
  packages: write
  id-token: write
  security-events: write

env:
  CARGO_TERM_COLOR: always

jobs:
  ci-gate:
    name: CI Gate
    uses: ./.github/workflows/ci.yml

  build-release:
    name: Build Release (${{ matrix.platform }})
    needs: ci-gate
    strategy:
      matrix:
        include:
          - platform: linux
            runner: ubuntu-latest
          - platform: macos-arm64
            runner: macos-latest
          - platform: windows
            runner: windows-latest
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: ./.github/actions/setup-rust-env
        with:
          cache-prefix: release-${{ matrix.platform }}
          install-system-deps: ${{ matrix.platform == 'linux' }}

      - name: Install macOS deps
        if: matrix.platform == 'macos-arm64'
        run: brew install gstreamer dav1d libvpx openh264 opus fdk-aac

      - name: Install Windows deps
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          # GStreamer via choco (avoids freedesktop.org bot detection)
          choco install gstreamer gstreamer-devel --version=1.22.6 -y --no-progress
          $GstRoot = "C:\gstreamer\1.0\msvc_x86_64"
          if (Test-Path $GstRoot) {
            echo "GSTREAMER_1_0_ROOT_MSVC_X86_64=$GstRoot" >> $env:GITHUB_ENV
            echo "PKG_CONFIG_PATH=$GstRoot\lib\pkgconfig" >> $env:GITHUB_ENV
            echo "$GstRoot\bin" >> $env:GITHUB_PATH
          }

          # pkg-config for Rust build scripts
          choco install pkgconfiglite -y --no-progress

          # Tarang codec deps via vcpkg (pre-installed on GitHub runners)
          vcpkg install dav1d:x64-windows libvpx:x64-windows opus:x64-windows
          echo "VCPKG_ROOT=$env:VCPKG_INSTALLATION_ROOT" >> $env:GITHUB_ENV

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: ui/package-lock.json

      - name: Build frontend
        run: |
          cd ui && npm ci && npm run build

      - name: Read version
        id: version
        run: echo "version=$(cat VERSION)" >> "$GITHUB_OUTPUT"

      - name: Build release
        run: cargo build --release --workspace

      - name: Package release (Unix)
        if: matrix.platform != 'windows'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          RELEASE_DIR="tazama-${VERSION}-${{ matrix.platform }}"
          mkdir -p "${RELEASE_DIR}"

          cp target/release/tazama "${RELEASE_DIR}/" 2>/dev/null || true
          cp target/release/tazama-mcp "${RELEASE_DIR}/" 2>/dev/null || true
          cp LICENSE README.md "${RELEASE_DIR}/"
          cp -r docs/ "${RELEASE_DIR}/docs/" 2>/dev/null || true

          tar czf "${RELEASE_DIR}.tar.gz" "${RELEASE_DIR}"
          sha256sum "${RELEASE_DIR}.tar.gz" > "${RELEASE_DIR}.tar.gz.sha256" 2>/dev/null || \
            shasum -a 256 "${RELEASE_DIR}.tar.gz" > "${RELEASE_DIR}.tar.gz.sha256"

      - name: Package release (Windows)
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          $Version = Get-Content VERSION -Raw
          $Version = $Version.Trim()
          $ReleaseDir = "tazama-$Version-windows"
          New-Item -ItemType Directory -Path $ReleaseDir -Force

          Copy-Item "target\release\tazama.exe" "$ReleaseDir\" -ErrorAction SilentlyContinue
          Copy-Item "target\release\tazama-mcp.exe" "$ReleaseDir\" -ErrorAction SilentlyContinue
          Copy-Item LICENSE, README.md "$ReleaseDir\"
          Copy-Item -Recurse docs "$ReleaseDir\docs" -ErrorAction SilentlyContinue

          Compress-Archive -Path $ReleaseDir -DestinationPath "$ReleaseDir.zip"
          (Get-FileHash "$ReleaseDir.zip" -Algorithm SHA256).Hash + "  $ReleaseDir.zip" | Out-File "$ReleaseDir.zip.sha256"

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.platform }}
          path: |
            tazama-*.tar.gz
            tazama-*.tar.gz.sha256
            tazama-*.zip
            tazama-*.zip.sha256
          retention-days: 7

  generate-sbom:
    name: Generate SBOM
    runs-on: ubuntu-latest
    needs: ci-gate
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: ./.github/actions/setup-rust-env
        with:
          cache-prefix: sbom

      - name: Install SBOM tools
        run: |
          cargo install cargo-cyclonedx --locked
          cargo install cargo-license --locked

      - name: Generate CycloneDX SBOM
        run: |
          cargo cyclonedx --format json --override-filename tazama-sbom
          cargo cyclonedx --format xml --override-filename tazama-sbom
          mkdir -p sbom-out
          find . -name 'tazama-sbom*' -not -path './sbom-out/*' -exec cp {} sbom-out/ \;

      - name: Generate license report
        run: |
          cargo license --json > sbom-out/tazama-licenses.json
          cargo license > sbom-out/tazama-licenses.txt

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom-out/
          retention-days: 90

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-release, generate-sbom]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version
        id: version
        run: |
          RAW=$(cat VERSION)
          echo "version=${RAW}" >> "$GITHUB_OUTPUT"

      - name: Extract changelog
        id: changelog
        run: |
          VERSION=$(cat VERSION)
          # Extract section for current version from CHANGELOG.md
          BODY=$(sed -n "/^## ${VERSION}$/,/^## [0-9]/p" CHANGELOG.md | head -n -1 | tail -n +2)
          if [ -z "$BODY" ]; then
            BODY="See [CHANGELOG.md](https://github.com/anomalyco/tazama/blob/main/CHANGELOG.md) for details."
          fi
          echo "body<<EOF" >> "$GITHUB_OUTPUT"
          echo "$BODY" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: Tazama ${{ steps.version.outputs.version }}
          body: |
            ## Tazama ${{ steps.version.outputs.version }}

            ${{ steps.changelog.outputs.body }}

            ### Downloads
            | Platform | Archive |
            |----------|---------|
            | Linux x86_64 | `tazama-${{ steps.version.outputs.version }}-linux.tar.gz` |
            | macOS arm64 | `tazama-${{ steps.version.outputs.version }}-macos-arm64.tar.gz` |
            | Windows x64 | `tazama-${{ steps.version.outputs.version }}-windows.zip` |

            ### Contents
            - `tazama` — Desktop video editor (Tauri app)
            - `tazama-mcp` — MCP server (8 tools for AI integration)
            - `docs/` — Development documentation
            - SBOM and license reports attached separately

            ### Verification
            Each archive includes a `.sha256` checksum file.

            ### System Requirements
            - Vulkan-capable GPU (or lavapipe for software rendering)
            - GStreamer 1.20+ with base/good plugins
            - PipeWire or ALSA for audio
          files: |
            release-artifacts/release-linux/*
            release-artifacts/release-macos-arm64/*
            release-artifacts/release-windows/*
            release-artifacts/sbom/*
          prerelease: true
