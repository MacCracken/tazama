name: Release

on:
  push:
    tags:
      - '[0-9][0-9][0-9][0-9].*'

permissions:
  contents: write
  packages: write
  id-token: write
  security-events: write

env:
  CARGO_TERM_COLOR: always

jobs:
  ci-gate:
    name: CI Gate
    uses: ./.github/workflows/ci.yml

  build-release:
    name: Build Release (${{ matrix.platform }})
    needs: ci-gate
    strategy:
      matrix:
        include:
          - platform: linux
            runner: ubuntu-latest
          - platform: macos-arm64
            runner: macos-latest
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: ./.github/actions/setup-rust-env
        with:
          cache-prefix: release-${{ matrix.platform }}
          install-system-deps: ${{ matrix.platform == 'linux' }}

      - name: Install macOS deps
        if: matrix.platform == 'macos-arm64'
        run: brew install gstreamer

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: ui/package-lock.json

      - name: Build frontend
        run: |
          cd ui && npm ci && npm run build

      - name: Read version
        id: version
        run: echo "version=$(cat VERSION)" >> "$GITHUB_OUTPUT"

      - name: Build release
        run: cargo build --release --workspace

      - name: Package release
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          RELEASE_DIR="tazama-${VERSION}-${{ matrix.platform }}"
          mkdir -p "${RELEASE_DIR}"

          cp target/release/tazama "${RELEASE_DIR}/" 2>/dev/null || true
          cp LICENSE README.md "${RELEASE_DIR}/"
          cp -r docs/ "${RELEASE_DIR}/docs/" 2>/dev/null || true

          tar czf "${RELEASE_DIR}.tar.gz" "${RELEASE_DIR}"
          sha256sum "${RELEASE_DIR}.tar.gz" > "${RELEASE_DIR}.tar.gz.sha256" 2>/dev/null || \
            shasum -a 256 "${RELEASE_DIR}.tar.gz" > "${RELEASE_DIR}.tar.gz.sha256"

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.platform }}
          path: |
            tazama-*.tar.gz
            tazama-*.tar.gz.sha256
          retention-days: 7

  generate-sbom:
    name: Generate SBOM
    runs-on: ubuntu-latest
    needs: ci-gate
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: ./.github/actions/setup-rust-env
        with:
          cache-prefix: sbom

      - name: Install SBOM tools
        run: |
          cargo install cargo-cyclonedx --locked
          cargo install cargo-license --locked

      - name: Generate CycloneDX SBOM
        run: |
          cargo cyclonedx --format json --override-filename tazama-sbom
          cargo cyclonedx --format xml --override-filename tazama-sbom
          mkdir -p sbom-out
          find . -name 'tazama-sbom*' -not -path './sbom-out/*' -exec cp {} sbom-out/ \;

      - name: Generate license report
        run: |
          cargo license --json > sbom-out/tazama-licenses.json
          cargo license > sbom-out/tazama-licenses.txt

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom-out/
          retention-days: 90

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-release, generate-sbom]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version
        id: version
        run: |
          RAW=$(cat VERSION)
          echo "version=${RAW}" >> "$GITHUB_OUTPUT"

      - name: Generate changelog
        id: changelog
        run: |
          TAG_COUNT=$(git tag --sort=-version:refname | wc -l)
          if [ "$TAG_COUNT" -ge 2 ]; then
            PREV_TAG=$(git tag --sort=-version:refname | sed -n '2p')
            CHANGELOG=$(git log --oneline --no-decorate "${PREV_TAG}..HEAD")
          else
            CHANGELOG=$(git log --oneline --no-decorate)
          fi
          echo "changelog<<EOF" >> "$GITHUB_OUTPUT"
          echo "$CHANGELOG" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: Tazama ${{ steps.version.outputs.version }}
          body: |
            ## Tazama ${{ steps.version.outputs.version }}

            ### Changes
            ${{ steps.changelog.outputs.changelog }}

            ### Downloads
            | Platform | Archive |
            |----------|---------|
            | Linux x86_64 | `tazama-${{ steps.version.outputs.version }}-linux.tar.gz` |
            | macOS arm64 | `tazama-${{ steps.version.outputs.version }}-macos-arm64.tar.gz` |

            ### Verification
            Each archive includes a `.sha256` checksum file.
          files: |
            release-artifacts/release-linux/*
            release-artifacts/release-macos-arm64/*
            release-artifacts/sbom/*
          prerelease: true
