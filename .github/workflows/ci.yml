name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_call:

permissions:
  contents: read
  security-events: write

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: ./.github/actions/setup-rust-env
        with:
          cache-prefix: build

      - name: Build workspace
        run: cargo build --release --workspace

  quality:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: ./.github/actions/setup-rust-env
        with:
          cache-prefix: quality

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: ./.github/actions/setup-rust-env
        with:
          cache-prefix: security

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          severity: 'CRITICAL,HIGH'
          format: 'sarif'
          output: 'trivy-results.sarif'
        continue-on-error: true

      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'
        continue-on-error: true

      - name: Cargo audit
        run: |
          cargo install cargo-audit --locked
          cargo audit || echo "::warning::cargo audit found advisories"
        continue-on-error: true

      - name: Cargo deny
        run: |
          cargo install cargo-deny --locked
          cargo deny check
        continue-on-error: true

      - name: Check outdated deps
        run: |
          cargo install cargo-outdated --locked
          cargo outdated --root-deps-only
        continue-on-error: true

  test:
    name: Test (${{ matrix.package }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package:
          - tazama-core
          - tazama-media
          - tazama-storage
          - tazama-gpu
          - tazama
          - tazama-mcp
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: ./.github/actions/setup-rust-env
        with:
          cache-prefix: test

      - name: Run tests
        run: cargo test --package ${{ matrix.package }}

  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: ./.github/actions/setup-rust-env
        with:
          cache-prefix: coverage

      - name: Install tarpaulin
        run: cargo install cargo-tarpaulin --locked

      - name: Run coverage
        run: |
          cargo tarpaulin --workspace \
            --exclude tazama \
            --fail-under 65 \
            --timeout 300 \
            --out xml \
            --skip-clean

      - name: Upload to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: cobertura.xml
          fail_ci_if_error: false

  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: ui/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: ui

      - name: Build
        run: npm run build
        working-directory: ui

  docs:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: ./.github/actions/setup-rust-env
        with:
          cache-prefix: docs

      - name: Check required docs
        run: |
          for f in README.md CONTRIBUTING.md LICENSE CHANGELOG.md; do
            if [ ! -f "$f" ]; then
              echo "Missing required doc: $f"
              exit 1
            fi
          done

      - name: Build docs
        env:
          RUSTDOCFLAGS: "-D warnings"
        run: cargo doc --workspace --no-deps

  license:
    name: License Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify license
        run: |
          if ! grep -q "GNU AFFERO GENERAL PUBLIC LICENSE" LICENSE; then
            echo "LICENSE file must contain AGPL-3.0"
            exit 1
          fi
