[package]
name = "tazama-media"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true

[dependencies]
tazama-core = { path = "../core" }
serde.workspace = true
gstreamer.workspace = true
gstreamer-video.workspace = true
gstreamer-audio.workspace = true
gstreamer-app.workspace = true
gstreamer-pbutils.workspace = true
tokio.workspace = true
bytes.workspace = true
thiserror.workspace = true
tracing.workspace = true
cpal.workspace = true
tarang-core = { workspace = true, optional = true }
tarang-audio = { workspace = true, optional = true }
symphonia = { version = "0.5", features = ["all"], optional = true }

[features]
default = []
tarang = ["dep:tarang-core", "dep:tarang-audio", "dep:symphonia"]

[dev-dependencies]
tokio = { workspace = true, features = ["macros", "rt-multi-thread"] }
serde_json.workspace = true
